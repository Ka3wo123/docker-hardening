---
# Kyverno policy: Enforce resource limits
# CIS Docker Benchmark 5.10 - Ensure that memory usage for container is limited

apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-resource-limits
  annotations:
    policies.kyverno.io/title: Enforce resource limits CPU and memory
    policies.kyverno.io/category: Resource Management / DoS Prevention
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod, Container
    policies.kyverno.io/description: >-
      All containers MUST contain defined CPU and memory limits.
      Lack of resource limits can lead to DoS attacks and resource exhaustion and affect on the other services running on host.
    audit-controls: "CIS-5.10, CIS-5.11, NIST-SI-16"
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-cpu-memory-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
      validate:
        message: >-
          Container MUST contains defined resource limits.
          Add: resources.limits.cpu and resources.limits.memory.
          Example: cpu: "500m", memory: "256Mi"
        pattern:
          spec:
            containers:
              - resources:
                  limits:
                    cpu: "?*"
                    memory: "?*"
                  requests:
                    cpu: "?*"
                    memory: "?*"

    - name: restrict-max-memory
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: >-
          Resource limit cannot exceed 4Gi for standard workloads.
          Contact with platform team for workloads that need more resources.
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.containers[].resources.limits.memory }}"
                operator: AnyGreaterThan
                value: "4Gi"

---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-pod-security-context
  annotations:
    policies.kyverno.io/title: Enforce secure context on Pod
    policies.kyverno.io/category: Pod Security Standards
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Pod-level security context must be configured with security requirements: runAsNonRoot, seccompProfile and fsGroup.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-pod-security-context
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: >-
          Pod MUST contains configured securityContext with:
          - runAsNonRoot: true
          - runAsUser: >= 1000
          - fsGroup: != 0
          - seccompProfile.type: RuntimeDefault or Localhost
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
              runAsUser: ">= 1000"
              fsGroup: ">= 1"
              seccompProfile:
                type: "RuntimeDefault | Localhost"
