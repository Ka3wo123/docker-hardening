---
# Kyverno policy: Enforcing signed images and trusted registers.
# CIS Docker Benchmark 4.02 - Ensure that containers use only trusted base images

apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-trusted-registry
  annotations:
    policies.kyverno.io/title: Enforce trusted registers
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
    policies.kyverno.io/subject: Pod, Container, Image
    policies.kyverno.io/description: >-
      Images must origin only from accepted registers.
      It blocks images usage from untrusted sources (for example Docker Hub without organization, images without version tag)
    audit-controls: "CIS-4.2, CIS-4.9, NIST-CM-7, SLSA-L2"
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: restrict-to-trusted-registries
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
      validate:
        message: >-
          Image must origin from accepted register.
          Allowed registers: gcr.io/*, registry.example.com/*, ghcr.io/your-org/*.
          Current source: {{ request.object.spec.containers[].image }}
        pattern:
          spec:
            containers:
              - image: "gcr.io/* | registry.example.com/* | ghcr.io/your-org/* | quay.io/your-org/*"
            =(initContainers):
              - image: "gcr.io/* | registry.example.com/* | ghcr.io/your-org/* | quay.io/your-org/*"

    - name: disallow-latest-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: >-
          'latest' tag is FORBIDDEN - doesn't guarantee reproduciblity.
          Use specific version or sha256 image digest.          
          Example: image: myapp:1.2.3 or image: myapp@sha256:abc123...
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.containers[].image }}"
                operator: AnyIn
                value:
                  - "*:latest"
                  - "*/latest"
              - key: "{{ request.object.spec.initContainers[].image }}"
                operator: AnyIn
                value:
                  - "*:latest"

---
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: verify-image-signatures
  annotations:
    policies.kyverno.io/title: Verify digital image signs
    policies.kyverno.io/category: Supply Chain Security / Image Integrity
    policies.kyverno.io/severity: critical
    policies.kyverno.io/description: >-
      All production images must be digitally signed using Cosign/Sigstore.
      It prevents unverified or modified images (supply chain attacks).
spec:
  validationFailureAction: Enforce
  background: false
  rules:
    - name: verify-cosign-signature
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - production
                - staging
      verifyImages:
        - imageReferences:
            - "registry.example.com/*"
          attestors:
            - count: 1
              entries:
                - keyless:
                    subject: "https://github.com/your-org/*"
                    issuer: "https://token.actions.githubusercontent.com"
                    rekor:
                      url: https://rekor.sigstore.dev
          mutateDigest: true
          required: true
