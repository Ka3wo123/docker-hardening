name: Docker Security Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - '**/Dockerfile*'
      - 'docker-compose*.yml'
      - '.hadolint.yaml'
      - 'trivy/**'
      - 'policies/**'
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write 
  pull-requests: write    

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  TRIVY_VERSION: "0.50.2"
  HADOLINT_VERSION: "2.12.0"

jobs:
  hadolint:
    name: "Hadolint - Dockerfile Lint"
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Hadolint for secure Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: dockerfiles/secure/Dockerfile.good
          config: .hadolint.yaml
          format: sarif
          output-file: hadolint-results-secure.sarif
          no-fail: false
          failure-threshold: error

      - name: Run Hadolint for insecure Dockerfile (expecting errors)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: dockerfiles/insecure/Dockerfile.bad
          config: .hadolint.yaml
          format: sarif
          output-file: hadolint-results-insecure.sarif
          no-fail: true

      - name: Upload Hadolint results do GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: hadolint-results-secure.sarif
          category: hadolint

      - name: Secure vs insecure comparision
        if: always()
        run: |
          echo "=== Hadolint: Secure Dockerfile ==="
          hadolint --config .hadolint.yaml --format tty dockerfiles/secure/Dockerfile.good || true
          echo ""
          echo "=== Hadolint: Insecure Dockerfile ==="
          hadolint --config .hadolint.yaml --format tty dockerfiles/insecure/Dockerfile.bad || true

  build:
    name: "Build Docker Images"
    runs-on: ubuntu-22.04
    needs: hadolint

    outputs:
      secure-image-digest: ${{ steps.build-secure.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=,format=short

      - name: Build secure image
        id: build-secure
        uses: docker/build-push-action@v5
        with:
          context: dockerfiles/secure
          file: dockerfiles/secure/Dockerfile.good
          push: false
          load: true
          tags: myapp:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Save image to tar
        run: |
          docker save myapp:${{ github.sha }} -o /tmp/myapp-image.tar
          ls -la /tmp/myapp-image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/myapp-image.tar
          retention-days: 1

  trivy-scan:
    name: "Trivy - Security Scan"
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load -i /tmp/myapp-image.tar

      - name: Install Trivy
        run: |
          wget -qO- "https://github.com/aquasecurity/trivy/releases/download/v${{ env.TRIVY_VERSION }}/trivy_${{ env.TRIVY_VERSION }}_Linux-64bit.tar.gz" | \
            tar xz -C /usr/local/bin trivy
          trivy --version

      - name: Trivy - scanning CVE
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: myapp:${{ github.sha }}
          format: sarif
          output: trivy-vuln-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: false
          vuln-type: os,library

      - name: Trivy - scanning secrets
        if: always()
        run: |
          trivy image \
            --scanners secret \
            --secret-config trivy/trivy-secret.yaml \
            --format table \
            --exit-code 1 \
            myapp:${{ github.sha }}

      - name: Trivy - scanning Dockerfile configuration (Misconfiguration)
        if: always()
        run: |
          trivy config \
            --exit-code 1 \
            --severity CRITICAL,HIGH,MEDIUM \
            --policy trivy/policies/ \
            --format table \
            dockerfiles/

      - name: Trivy - scanning insecure Dockerfile
        if: always()
        run: |
          echo "=== Scanning insecure Dockerfile - expecting errors ==="
          trivy config \
            --exit-code 0 \
            --severity CRITICAL,HIGH,MEDIUM \
            --policy trivy/policies/ \
            --format table \
            dockerfiles/insecure/ || true

      - name: Generate SBOM (Software Bill of Materials)
        if: always()
        run: |
          trivy image \
            --format cyclonedx \
            --output sbom-cyclonedx.json \
            myapp:${{ github.sha }}

          trivy image \
            --format spdx-json \
            --output sbom-spdx.json \
            myapp:${{ github.sha }}

      - name: Upload Trivy results do GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-vuln-results.sarif
          category: trivy

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sbom-reports
          path: |
            sbom-cyclonedx.json
            sbom-spdx.json
          retention-days: 30

  kyverno-validate:
    name: "Kyverno - Policy Validation"
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Kyverno CLI
        run: |
          curl -L "https://github.com/kyverno/kyverno/releases/download/v1.12.0/kyverno_1.12.0_linux_amd64.tar.gz" | \
            tar xz -C /tmp kyverno
          chmod +x /tmp/kyverno
          sudo mv /tmp/kyverno /usr/local/bin/kyverno
          kyverno version

      - name: Walidacja składni polityk Kyverno
        run: |
          echo "=== Validate Kyverno policies ==="
          for policy in policies/kyverno/*.yaml; do
            echo "Checking: $policy"
            kyverno test "$policy" --detailed-results 2>/dev/null || \
              echo "  INFO: Lack of test cases for $policy (add kyverno-test.yaml)"
          done

      - name: Kyverno - Apply policies to example manifests
        run: |
          cat > /tmp/pod-secure.yaml << 'EOF'
          apiVersion: v1
          kind: Pod
          metadata:
            name: secure-pod
            namespace: default
          spec:
            securityContext:
              runAsNonRoot: true
              runAsUser: 10001
              fsGroup: 10001
              seccompProfile:
                type: RuntimeDefault
            containers:
              - name: app
                image: registry.example.com/myapp:1.0.0
                securityContext:
                  runAsNonRoot: true
                  runAsUser: 10001
                  readOnlyRootFilesystem: true
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                      - ALL
                resources:
                  limits:
                    cpu: "500m"
                    memory: "256Mi"
                  requests:
                    cpu: "100m"
                    memory: "64Mi"
          EOF

          echo "=== Test: Compliant pod ==="
          kyverno apply policies/kyverno/ --resource /tmp/pod-secure.yaml || true

          cat > /tmp/pod-insecure.yaml << 'EOF'
          apiVersion: v1
          kind: Pod
          metadata:
            name: insecure-pod
            namespace: default
          spec:
            hostPID: true
            hostNetwork: true
            containers:
              - name: app
                image: ubuntu:latest
                securityContext:
                  privileged: true
                  runAsUser: 0
                  capabilities:
                    add:
                      - SYS_ADMIN
                      - NET_ADMIN
          EOF

          echo "=== Test: Pod should be blocked ==="
          kyverno apply policies/kyverno/ --resource /tmp/pod-insecure.yaml || true

  validate-daemon:
    name: "Validate daemon.json"
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check daemon.json
        run: |
          echo "=== Validate daemon.json ==="
          jq empty daemon/daemon.json && echo "✓ Correct JSON" || exit 1

          check_field() {
            local field="$1"
            local expected="$2"
            local actual
            actual=$(jq -r "$field" daemon/daemon.json)
            if [[ "$actual" == "$expected" ]]; then
              echo "✓ $field = $actual"
            else
              echo "✗ $field = $actual (expected: $expected)"
              return 1
            fi
          }

          check_field '.icc' 'false'
          check_field '."no-new-privileges"' 'true'
          check_field '."live-restore"' 'true'
          check_field '.tls' 'true'
          check_field '.tlsverify' 'true'

  security-report:
    name: "Security Report"
    runs-on: ubuntu-22.04
    needs: [hadolint, trivy-scan, kyverno-validate, validate-daemon]
    if: always()

    steps:
      - name: Generate security summary
        run: |
          echo "# 🔒 Docker Security Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Status | Description |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Hadolint | ${{ needs.hadolint.result == 'success' && '✅ Pass' || '❌ Fail' }} | Dockerfile lint |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy | ${{ needs.trivy-scan.result == 'success' && '✅ Pass' || '❌ Fail' }} | CVE + Secrets + Misconfig |" >> $GITHUB_STEP_SUMMARY
          echo "| Kyverno | ${{ needs.kyverno-validate.result == 'success' && '✅ Pass' || '❌ Fail' }} | Policy validation |" >> $GITHUB_STEP_SUMMARY
          echo "| daemon.json | ${{ needs.validate-daemon.result == 'success' && '✅ Pass' || '❌ Fail' }} | Daemon config |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp:** $(date -u)" >> $GITHUB_STEP_SUMMARY
