# trivy-secret.yaml - Config file for secrets scanning for Trivy

enable-builtin-rules: true

custom-rules:
  - id: internal-api-key
    category: general
    title: "Internal API Key Pattern"
    severity: CRITICAL
    regex: "(?i)(internal[_-]?api[_-]?key|int[_-]api[_-]key)\\s*[:=]\\s*['\"]?[a-zA-Z0-9+/]{32,}"
    secret-group-name: secret

  - id: database-connection-string
    category: database
    title: "Database Connection String with Credentials"
    severity: HIGH
    regex: "(postgresql|mysql|mongodb)://[^:]+:[^@]+@"
    secret-group-name: secret

  - id: docker-registry-credentials
    category: container
    title: "Docker Registry Credentials"
    severity: HIGH
    regex: "(?i)docker[_-]?password\\s*[:=]\\s*['\"]?\\S{8,}"
    secret-group-name: secret

  - id: kubernetes-service-account-token
    category: cloud
    title: "Kubernetes Service Account Token"
    severity: CRITICAL
    regex: "eyJhbGciOiJSUzI1NiIsImtpZCI6"
    secret-group-name: secret

allow-rules:
  - id: test-credentials
    paths:
      - "**/*_test.go"
      - "**/*_test.py"
      - "**/testdata/**"
      - "**/tests/**"
    regex: "(?i)(test|fake|mock|dummy|example)[_-]?(password|secret|key|token)"

  - id: documentation-examples
    paths:
      - "**/README*"
      - "**/docs/**"
      - "**/*.md"
    regex: "(?i)(example|sample|placeholder)[_-]?(password|secret|key)"
